<!DOCTYPE html>

<head>

<title>Quiz App</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.quiz-container {
  background: white;
  padding: 20px;
  width: 400px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
  margin: 5px;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

#skip {
  background: black;
  color: white;
}

.correct {
  background-color: blue;
  color: white;
}

.wrong {
  background-color: red;
  color: white;
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.hide {
  display: none;
}

#result-buttons {
  margin-top: 15px;
}
</style>
</head>

    <button id="retryBtn">Try Again</button>

// 🔀 Shuffle
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

let shuffledQuestions = shuffle([...questionBank]);

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const resultEl = document.getElementById("result");
const skipBtn = document.getElementById("skip");

const resultButtons = document.getElementById("result-buttons");
const homeBtn = document.getElementById("homeBtn");
const retryBtn = document.getElementById("retryBtn");

// LOAD QUESTION
function loadQuestion() {
  answered = false;
  skipBtn.disabled = false;

  if (answeredCount >= TOTAL_QUESTIONS) {
    showResult();
    return;
  }

  const current = shuffledQuestions[index];

  questionEl.textContent = `${answeredCount + 1}. ${current.q}`;
  answersEl.innerHTML = "";

  current.a.forEach((option, i) => {
    const btn = document.createElement("button");
    btn.textContent = `${String.fromCharCode(65 + i)}. ${option}`;
    btn.onclick = () => checkAnswer(i);
    answersEl.appendChild(btn);
  });
}

// CHECK ANSWER
function checkAnswer(selected) {
  if (answered) return;
  answered = true;
  skipBtn.disabled = true;

  const buttons = document.querySelectorAll("#answers button");
  const correctIndex = shuffledQuestions[index].correct;

  buttons.forEach((btn, i) => {
    btn.disabled = true;

    if (i === correctIndex) btn.classList.add("correct");
    if (i === selected && i !== correctIndex) btn.classList.add("wrong");
  });

  if (selected === correctIndex) score++;

  answeredCount++;

  setTimeout(() => {
    index++;
    loadQuestion();
  }, 1000);
}

// SKIP
skipBtn.onclick = () => {
  if (answered) return;

  answeredCount++;
  index++;
  loadQuestion();
};

// RESULT
function showResult() {
  questionEl.classList.add("hide");
  answersEl.classList.add("hide");
  skipBtn.classList.add("hide");

  let grade = "";
  if (score >= 16) grade = "A";
  else if (score >= 12) grade = "B";
  else if (score >= 8) grade = "C";
  else grade = "F";

  resultEl.classList.remove("hide");
  resultEl.textContent = `Score: ${score}/20 | Grade: ${grade}`;

  resultButtons.classList.remove("hide");
}

// RETRY
retryBtn.onclick = () => {
  index = 0;
  score = 0;
  answeredCount = 0;

  shuffledQuestions = shuffle([...questionBank]);

  resultEl.classList.add("hide");
  resultButtons.classList.add("hide");

  questionEl.classList.remove("hide");
  answersEl.classList.remove("hide");
  skipBtn.classList.remove("hide");

  loadQuestion();
};

// HOME
homeBtn.onclick = () => {
  location.reload(); // or redirect
};

// START
loadQuestion();

</script>
